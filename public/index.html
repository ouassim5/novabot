<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>القميص الذهبي — مساعد ذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#0a0800,#1a1200,#0a0800);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(212,175,55,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{width:100%;max-width:460px;position:relative;z-index:1}
.header{background:rgba(20,15,0,.97);border:1px solid rgba(212,175,55,.25);border-bottom:none;border-radius:18px 18px 0 0;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.avatar{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#b8860b,#ffd700);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(212,175,55,.4);flex-shrink:0}
.hinfo{margin-right:12px}
.hname{color:#ffd700;font-weight:600;font-size:15px}
.hstatus{display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%;background:#ffd700;box-shadow:0 0 6px #ffd700;animation:pulse 2s infinite}
.hstatus span{color:#d4af37;font-size:12px}
.badge{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:8px;padding:4px 10px;color:#d4af37;font-size:11px}
.msgs{background:rgba(10,8,0,.97);border:1px solid rgba(212,175,55,.08);border-top:none;border-bottom:none;height:380px;overflow-y:auto;padding:18px 18px 10px;display:flex;flex-direction:column;gap:12px}
.msgs::-webkit-scrollbar{width:3px}.msgs::-webkit-scrollbar-thumb{background:#2a1f00;border-radius:2px}
.msg-row{display:flex;animation:up .3s ease forwards}
.msg-row.user{justify-content:flex-start}
.bot-avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#b8860b,#ffd700);display:flex;align-items:center;justify-content:center;font-size:13px;margin-left:9px;margin-top:2px;flex-shrink:0}
.bubble{max-width:76%;padding:10px 14px;font-size:13.5px;line-height:1.7}
.bubble.user{background:linear-gradient(135deg,#b8860b,#8b6914);border-radius:4px 16px 16px 16px;color:#fff9e6;box-shadow:0 4px 14px rgba(184,134,11,.3)}
.bubble.bot{background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.1);border-radius:16px 4px 16px 16px;color:#e8d5a0;text-align:right}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:#d4af37;display:inline-block;animation:bounce 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
.sug-label{color:#4a3800;font-size:10px;margin-bottom:7px;padding-right:37px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.sug-pills{display:flex;flex-wrap:wrap;gap:6px;padding-right:37px;justify-content:flex-end}
.pill{background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.25);border-radius:20px;padding:5px 12px;color:#d4af37;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:500;transition:all .2s}
.pill:hover{background:rgba(212,175,55,.15);border-color:rgba(212,175,55,.5)}
.input-bar{background:rgba(15,10,0,.98);border:1px solid rgba(212,175,55,.1);border-top:1px solid rgba(212,175,55,.06);border-radius:0 0 18px 18px;padding:14px 16px;display:flex;gap:10px;align-items:center;flex-direction:row-reverse}
input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:10px 15px;color:#e8d5a0;font-size:13.5px;outline:none;font-family:'Cairo',sans-serif;caret-color:#d4af37;transition:border-color .2s;text-align:right}
input:focus{border-color:rgba(212,175,55,.4)}
input::placeholder{color:#3a2d00}
.send-btn{width:40px;height:40px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;transition:all .2s;flex-shrink:0}
.send-btn.active{background:linear-gradient(135deg,#b8860b,#8b6914);box-shadow:0 4px 14px rgba(184,134,11,.35)}
.send-btn.inactive{background:rgba(255,255,255,.05);cursor:not-allowed}
.footer{text-align:center;margin-top:12px;color:#2a1f00;font-size:10px;letter-spacing:.5px}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-6px);opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div style="display:flex;align-items:center;flex-direction:row-reverse">
      <div class="avatar">👑</div>
      <div class="hinfo">
        <div class="hname">القميص الذهبي</div>
        <div class="hstatus"><div class="dot"></div><span>متصل الآن</span></div>
      </div>
    </div>
    <div class="badge">مساعد ذكي</div>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="input-bar">
    <input id="inp" type="text" placeholder="اكتب سؤالك هنا..." autocomplete="off"/>
    <button class="send-btn inactive" id="btn">↑</button>
  </div>
  <div class="footer">مساعد ذكي مخصص لمتجر القميص الذهبي</div>
</div>

<script>
const API_URL = "/api/chat";
const SUGGESTED = ["شنو الأسعار؟","عندكم قمصان للعيد؟","كيفاه نطلب؟","واش عندكم توصيل؟"];
let history = [];
let loading = false;
const msgsEl = document.getElementById("msgs");
const inp = document.getElementById("inp");
const btn = document.getElementById("btn");

function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function addMsg(role, text) {
  const row = document.createElement("div");
  row.className = "msg-row " + (role === "user" ? "user" : "bot");
  if (role === "assistant") {
    const av = document.createElement("div");
    av.className = "bot-avatar"; av.textContent = "👑";
    row.appendChild(av);
  }
  const b = document.createElement("div");
  b.className = "bubble " + (role === "user" ? "user" : "bot");
  b.textContent = text;
  row.appendChild(b);
  msgsEl.appendChild(row);
  scroll();
}

function addTyping() {
  const row = document.createElement("div");
  row.className = "msg-row bot"; row.id = "typing";
  const av = document.createElement("div");
  av.className = "bot-avatar"; av.textContent = "👑";
  row.appendChild(av);
  const b = document.createElement("div");
  b.className = "bubble bot";
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  row.appendChild(b);
  msgsEl.appendChild(row); scroll();
}

function removeTyping() { const t = document.getElementById("typing"); if(t) t.remove(); }

function showSuggested() {
  const d = document.createElement("div"); d.id = "suggested";
  d.innerHTML = `<div class="sug-label">أسئلة شائعة</div>
    <div class="sug-pills">${SUGGESTED.map(q=>`<button class="pill" onclick="sendMsg('${q}')">${q}</button>`).join("")}</div>`;
  msgsEl.appendChild(d);
}

function updateBtn() {
  btn.className = "send-btn " + (inp.value.trim() && !loading ? "active" : "inactive");
}

async function sendMsg(text) {
  const msg = text || inp.value.trim();
  if (!msg || loading) return;
  inp.value = "";
  const sug = document.getElementById("suggested"); if(sug) sug.remove();
  updateBtn();
  history.push({ role: "user", content: msg });
  addMsg("user", msg);
  loading = true; addTyping();
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });
    const data = await res.json();
    const reply = data.reply || "عذراً، حاول مرة أخرى.";
    history.push({ role: "assistant", content: reply });
    removeTyping(); addMsg("assistant", reply);
  } catch { removeTyping(); addMsg("assistant", "خطأ في الاتصال، حاول مجدداً."); }
  loading = false; updateBtn(); inp.focus();
}

inp.addEventListener("input", updateBtn);
inp.addEventListener("keydown", e => { if(e.key === "Enter") sendMsg(); });
btn.addEventListener("click", () => sendMsg());

addMsg("assistant", "مرحباً بك في متجر القميص الذهبي 👑\nأنا مساعدك الذكي — اسألني عن أي شيء: أسعار، مقاسات، طلب، أو توصيل.");
showSuggested();
</script>
</body>
</html>
