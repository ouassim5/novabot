<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nova AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0a0e1a,#0d1628,#0a1520);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(110,231,183,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(110,231,183,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{width:100%;max-width:460px;position:relative;z-index:1}
.header{background:rgba(13,22,40,.97);border:1px solid rgba(110,231,183,.15);border-bottom:none;border-radius:18px 18px 0 0;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.avatar{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#059669,#34d399);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 18px rgba(52,211,153,.3);flex-shrink:0}
.hinfo{margin-left:12px}
.hname{color:#f0fdf4;font-weight:600;font-size:15px;letter-spacing:-.3px}
.hstatus{display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;animation:pulse 2s infinite}
.hstatus span{color:#6ee7b7;font-size:12px;font-weight:500}
.badge{background:rgba(110,231,183,.08);border:1px solid rgba(110,231,183,.15);border-radius:8px;padding:4px 10px;color:#6ee7b7;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.5px}
.msgs{background:rgba(10,14,26,.97);border:1px solid rgba(110,231,183,.08);border-top:none;border-bottom:none;height:380px;overflow-y:auto;padding:18px 18px 10px;display:flex;flex-direction:column;gap:12px}
.msgs::-webkit-scrollbar{width:3px}.msgs::-webkit-scrollbar-thumb{background:#1e2d40;border-radius:2px}
.msg-row{display:flex;animation:up .3s ease forwards}
.msg-row.user{justify-content:flex-end}
.bot-avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#059669,#34d399);display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:9px;margin-top:2px;flex-shrink:0}
.bubble{max-width:76%;padding:10px 14px;font-size:13.5px;line-height:1.6}
.bubble.user{background:linear-gradient(135deg,#059669,#047857);border-radius:16px 4px 16px 16px;color:#f0fdf4;box-shadow:0 4px 14px rgba(5,150,105,.25)}
.bubble.bot{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:4px 16px 16px 16px;color:#cbd5e1}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;animation:bounce 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
.sug-label{color:#334155;font-size:10px;margin-bottom:7px;padding-left:37px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.sug-pills{display:flex;flex-wrap:wrap;gap:6px;padding-left:37px}
.pill{background:rgba(110,231,183,.06);border:1px solid rgba(110,231,183,.2);border-radius:20px;padding:5px 12px;color:#6ee7b7;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
.pill:hover{background:rgba(110,231,183,.12);border-color:rgba(110,231,183,.4)}
.input-bar{background:rgba(13,18,32,.98);border:1px solid rgba(110,231,183,.1);border-top:1px solid rgba(110,231,183,.06);border-radius:0 0 18px 18px;padding:14px 16px;display:flex;gap:10px;align-items:center}
input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:10px 15px;color:#e2e8f0;font-size:13.5px;outline:none;font-family:'DM Sans',sans-serif;caret-color:#34d399;transition:border-color .2s}
input:focus{border-color:rgba(110,231,183,.35)}
input::placeholder{color:#334155}
input:disabled{opacity:.5;cursor:not-allowed}
.send-btn{width:40px;height:40px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;transition:all .2s;flex-shrink:0}
.send-btn.active{background:linear-gradient(135deg,#059669,#047857);box-shadow:0 4px 14px rgba(5,150,105,.3)}
.send-btn.inactive{background:rgba(255,255,255,.05);cursor:not-allowed}
.footer{text-align:center;margin-top:12px;color:#1e3a5f;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.5px}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-6px);opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div style="display:flex;align-items:center">
      <div class="avatar">✦</div>
      <div class="hinfo">
        <div class="hname">Nova Assistant</div>
        <div class="hstatus"><div class="dot"></div><span>Online</span></div>
      </div>
    </div>
    <div class="badge">AI · LIVE</div>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="input-bar">
    <input id="inp" type="text" placeholder="Ask me anything..." autocomplete="off"/>
    <button class="send-btn inactive" id="btn">↑</button>
  </div>
  <div class="footer">POWERED BY NOVA AI</div>
</div>

<script>
// ✅ يستدعي الـ backend الخاص بك — المفتاح مخفي تماماً
const API_URL = "/api/chat";

const SUGGESTED = [
  "What plans do you offer?",
  "Is there a free trial?",
  "Which integrations?",
  "How to contact support?"
];

let history = [];
let loading = false;
const msgsEl = document.getElementById("msgs");
const inp = document.getElementById("inp");
const btn = document.getElementById("btn");

function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function addMsg(role, text) {
  const row = document.createElement("div");
  row.className = "msg-row " + (role === "user" ? "user" : "bot");
  if (role === "assistant") {
    const av = document.createElement("div");
    av.className = "bot-avatar"; av.textContent = "✦";
    row.appendChild(av);
  }
  const b = document.createElement("div");
  b.className = "bubble " + (role === "user" ? "user" : "bot");
  b.textContent = text;
  row.appendChild(b);
  msgsEl.appendChild(row);
  scroll();
}

function addTyping() {
  const row = document.createElement("div");
  row.className = "msg-row bot"; row.id = "typing";
  const av = document.createElement("div");
  av.className = "bot-avatar"; av.textContent = "✦";
  row.appendChild(av);
  const b = document.createElement("div");
  b.className = "bubble bot";
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  row.appendChild(b);
  msgsEl.appendChild(row);
  scroll();
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function showSuggested() {
  const d = document.createElement("div");
  d.id = "suggested";
  d.innerHTML = `<div class="sug-label">Suggested</div>
    <div class="sug-pills">
      ${SUGGESTED.map(q => `<button class="pill" onclick="sendMsg('${q}')">${q}</button>`).join("")}
    </div>`;
  msgsEl.appendChild(d);
}

function updateBtn() {
  btn.className = "send-btn " + (inp.value.trim() && !loading ? "active" : "inactive");
}

async function sendMsg(text) {
  const msg = text || inp.value.trim();
  if (!msg || loading) return;
  inp.value = "";
  const sug = document.getElementById("suggested");
  if (sug) sug.remove();
  updateBtn();

  history.push({ role: "user", content: msg });
  addMsg("user", msg);
  loading = true;
  addTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });
    const data = await res.json();
    const reply = data.reply || data.error || "Sorry, try again.";
    history.push({ role: "assistant", content: reply });
    removeTyping();
    addMsg("assistant", reply);
  } catch {
    removeTyping();
    addMsg("assistant", "Connection error. Please try again.");
  }

  loading = false;
  updateBtn();
  inp.focus();
}

inp.addEventListener("input", updateBtn);
inp.addEventListener("keydown", e => { if (e.key === "Enter") sendMsg(); });
btn.addEventListener("click", () => sendMsg());

// Init
addMsg("assistant", "Hi! 👋 I'm Nova, NovaTech's AI assistant. Ask me anything about our products, pricing, or integrations.");
showSuggested();
</script>
</body>
</html>
